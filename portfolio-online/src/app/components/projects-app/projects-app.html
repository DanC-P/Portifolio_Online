<section id="projects" class="mb-20 animate-in" style="animation-delay: 0.3s">
  <div class="section-bar mb-4"></div>
  <h2 class="font-mono text-sm tracking-widest uppercase mb-6">Projetos</h2>

  <div class="grid gap-4">
    @for (project of listOfProjects; track project.name) {
      <div class="simply-card p-5 rounded-lg">
        <div class="flex items-center justify-between mb-2">
          <h3 class="project-title font-semibold">
            {{ project.name }}
          </h3>

          <span class="status-pill px-3 py-1 rounded-full text-[10px] font-mono uppercase">
            {{ project.status }}
          </span>
        </div>

        <p class="project-desc text-sm">
          {{ project.description }}
        </p>
      </div>
    } @empty {
      <p class="text-sm opacity-50 italic">Nenhum projeto para exibir.</p>
    }
  </div>
</section>
