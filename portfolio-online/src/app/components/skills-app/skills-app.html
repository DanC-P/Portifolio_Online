<section id="skills" class="mb-20 animate-in" style="animation-delay: 0.3s">
  <div class="section-bar mb-4"></div>
  <h2 class="font-mono text-sm tracking-widest uppercase mb-6">Skills</h2>
  <div class="flex flex-wrap gap-3">
    @for (skill of skills; track skill) {
      <span class="skill-pill px-5 py-2.5 rounded-full text-sm">
        {{ skill }}
      </span>
    }
  </div>
</section>
