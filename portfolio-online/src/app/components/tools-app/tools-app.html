<section id="tools" class="animate-in" style="animation-delay: 0.7s">
  <div class="section-bar mb-4"></div>
  <h2 class="font-mono text-sm tracking-widest uppercase mb-6">Ferramentas</h2>
  <div class="flex flex-wrap gap-3">
    @for (tool of tools; track tool) {
      <span class="skill-pill px-5 py-2.5 rounded-full text-sm">
        {{ tool }}
      </span>
    }
  </div>
</section>
